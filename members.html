<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitglieder – Tanneclan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --g1: #060f06; --g3: #14421a; --g4: #1a5c22;
  --g5: #217a2c; --g6: #2da83c; --g7: #3fd155;
  --g8: #7ee88f; --g9: #c2f5c8;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Exo 2', sans-serif; font-weight: 700;
  background: var(--g1); color: var(--g9); overflow-x: hidden;
}
.snow-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 85%, rgba(20,66,26,0.4) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 85% 15%, rgba(29,92,34,0.25) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* TOPBAR */
.topbar {
  position: relative; z-index: 10;
  padding: 1.5rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(180deg, rgba(4,10,4,0.97) 0%, transparent 100%);
  backdrop-filter: blur(10px);
}
.topbar-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem; letter-spacing: 4px;
  background: linear-gradient(135deg, #fff, var(--g7));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-decoration: none;
}
.back-btn {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.8rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
  color: var(--g8); text-decoration: none; opacity: 0.7;
}
.back-btn:hover { opacity: 1; color: var(--g7); }
.back-arrow { font-size: 1.1rem; }

/* PAGE HEADER */
.page-header {
  position: relative; z-index: 1;
  text-align: center; padding: 4rem 2rem 3rem;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 10vw, 7rem);
  background: linear-gradient(160deg, #ffffff 0%, var(--g8) 45%, var(--g6) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* CONTENT */
.content {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto; padding: 0 2rem 5rem;
}

/* CLAN */
.clan-block { padding: 3.5rem 0 0; }

.clan-block-header {
  display: flex; align-items: center; gap: 1.25rem;
  margin-bottom: 2rem;
}

.clan-block-line {
  flex: 1; height: 1px;
  background: rgba(63,209,85,0.2);
}

.clan-block-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
}

/* GRID */
.member-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.9rem;
}

/* CARD */
.member-card {
  display: flex; align-items: center; gap: 0.75rem;
  background: rgba(14,44,16,0.45);
  border-radius: 10px;
  padding: 0.65rem 0.85rem;
}

.card-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
}

/* ROLE */
.role-leader { color: #ffd750; }
.role-co-leader { color: var(--g7); }
.role-mod { color: #7ab8ff; }
.role-member { color: var(--g8); }

</style>
</head>

<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">Tanneclan</a>
  <a href="index.html" class="back-btn">← Zurück</a>
</div>

<div class="page-header">
  <h1 class="page-title">Mitglieder</h1>
</div>

<div class="content">

<!-- TANNE MAIN -->
<div class="clan-block">

  <div class="clan-block-header">
    <div class="clan-block-line"></div>
    <span class="clan-block-name">Tanne Main</span>
    <div class="clan-block-line"></div>
  </div>

  <div class="member-grid">
    <div class="member-card"><div class="card-name">Tannebenn</div></div>
    <div class="member-card"><div class="card-name">Turmeline</div></div>
    <div class="member-card"><div class="card-name">Pfoersich</div></div>
    <div class="member-card"><div class="card-name">Luke2042</div></div>
  </div>

</div>

<!-- T2NNE -->
<div class="clan-block">
  <div class="clan-block-header">
    <div class="clan-block-line"></div>
    <span class="clan-block-name">T2nne</span>
    <div class="clan-block-line"></div>
  </div>

  <div class="member-grid">
    <div class="member-card"><div class="card-name">Fastdeath05</div></div>
  </div>
</div>

<!-- T3NNE -->
<div class="clan-block">
  <div class="clan-block-header">
    <div class="clan-block-line"></div>
    <span class="clan-block-name">T3nne</span>
    <div class="clan-block-line"></div>
  </div>

  <div class="member-grid">
    <div class="member-card"><div class="card-name">Suchend</div></div>
  </div>
</div>

</div>

</body>
</html>
