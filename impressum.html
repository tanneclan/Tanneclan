<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hugo SMP Impressum</title>
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@700;800;900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --g1: #060f06;
  --g7: #3fd155;
  --g8: #7ee88f;
}

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--g1);
  color: white;
  min-height: 100vh;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 85%, rgba(20,66,26,0.4), transparent 60%),
    radial-gradient(ellipse 50% 70% at 85% 15%, rgba(45,168,60,0.25), transparent 60%);
  z-index: 0;
}

/* SNOW */
canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* BACK BUTTON */
.back-btn {
  position: fixed;
  top: 20px;
  right: 20px;

  padding: 0.6rem 1rem;
  border-radius: 12px;

  text-decoration: none;
  font-weight: 900;
  font-size: 0.85rem;

  color: var(--g8);

  background: rgba(20,66,26,0.4);
  border: 1px solid rgba(63,209,85,0.25);

  backdrop-filter: blur(8px);

  transition: 0.2s;
  z-index: 10;
}

.back-btn:hover {
  transform: translateY(-3px);
  border-color: rgba(63,209,85,0.6);
  box-shadow: 0 0 25px rgba(63,209,85,0.2);
}

/* CONTENT */
.wrapper {
  position: relative;
  z-index: 2;

  max-width: 900px;
  margin: 0 auto;

  padding: 80px 30px;
}

/* HEADER */
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4.5rem;
  letter-spacing: 4px;

  background: linear-gradient(160deg,#fff,var(--g8));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  margin-bottom: 10px;
}

.sub {
  font-size: 0.85rem;
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--g8);
  opacity: 0.6;
  margin-bottom: 40px;
}

/* TEXT */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1rem;
  letter-spacing: 2px;
  color: var(--g8);
  margin-bottom: 10px;
  text-transform: uppercase;
}

.section p {
  font-size: 0.95rem;
  line-height: 1.8;
  color: rgba(255,255,255,0.85);
}

.label {
  font-weight: 900;
  color: var(--g7);
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<a class="back-btn" href="index.html">← Zurück</a>

<div class="wrapper">

  <div class="title">IMPRESSUM</div>
  <div class="sub">Angaben gemäß § 5 TMG</div>

  <div class="section">
    <h2>Angaben zum Betreiber</h2>
    <p><span class="label">Benutzername:</span> Pfirsichbaum28</p>
  </div>

  <div class="section">
    <h2>Kontakt</h2>
    <p><span class="label">E-Mail:</span> Tanne.bewerbungen@gmail.com</p>
  </div>

  <div class="section">
    <h2>Haftungsausschluss</h2>
    <p>
      Diese Website steht in keiner Verbindung zu Mojang Studios oder Microsoft.
      Minecraft ist eine Marke von Mojang Studios.
    </p>
  </div>

</div>

<script>
/* SNOW */
const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

resize();
window.addEventListener('resize', resize);

const flakes = Array.from({length: 120}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: 1 + Math.random() * 2.5,
  sx: (Math.random() - 0.5) * 0.4,
  sy: 0.4 + Math.random() * 0.7,
  o: 0.15 + Math.random() * 0.5
}));

function draw() {
  ctx.clearRect(0, 0, W, H);

  for (const f of flakes) {
    ctx.globalAlpha = f.o;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    f.x += f.sx;
    f.y += f.sy;

    if (f.y > H) {
      f.y = -5;
      f.x = Math.random() * W;
    }
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
